    - generic [ref=e310]:
      - generic [ref=e311]:
        - main [ref=e312]:
          - generic [ref=e313]:
            - button [ref=e314] [cursor=pointer]
            - heading "# Limitations and Requirements" [level=1] [ref=e318]:
              - link "#" [ref=e319] [cursor=pointer]:
                - /url: "#limitations-and-requirements"
              - text: Limitations and Requirements
            - paragraph [ref=e320]: MangaDex is a non-profit service operating with limited infrastructure resources.
            - paragraph [ref=e321]: To ensure the continued stability of our platform and combat abuse, we enforce a handful of restrictions on incoming request rate on an IP-by-IP basis. Hence, if you're on a VPN, proxy or a shared network in general, the requests of other users on this network might affect your allowance.
            - heading "# General connection requirements" [level=2] [ref=e323]:
              - link "#" [ref=e324] [cursor=pointer]:
                - /url: "#general-connection-requirements"
              - text: General connection requirements
            - paragraph [ref=e325]: MangaDex supports HTTP/1.1, HTTP/2, and HTTP/3 over QUIC, and requires the usage of SSL/TLS for all of these.
            - generic [ref=e326]:
              - generic [ref=e327] [cursor=pointer]:
                - generic [ref=e329]: SSL/TLS requirements
                - link [ref=e333]:
                  - /url: "#ssltls-requirements"
              - generic [ref=e334]:
                - paragraph [ref=e335]: MangaDex requires that your browser/client supports the following specifications.
                - paragraph [ref=e336]:
                  - text: The TLS
                  - link "Server Name Indication" [ref=e337] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Server_Name_Indication
                  - text: "extension for the following protocols:"
                - list [ref=e338]:
                  - listitem [ref=e339]:
                    - text: TLSv1.2
                    - emphasis [ref=e340]: (deprecated for removal at a later date)
                  - listitem [ref=e341]: TLSv1.3
                - alert [ref=e344]:
                  - paragraph [ref=e352]: Insecure/plain-text requests will systematically result in an HTTP 30x redirection to the secure equivalent of the URL reached.
                - paragraph [ref=e353]:
                  - text: You may find a more detailed report on
                  - link "SSLLabs" [ref=e354] [cursor=pointer]:
                    - /url: https://www.ssllabs.com/ssltest/analyze.html?d=mangadex.org
                  - text: .
            - paragraph [ref=e355]: "Additionally, the following requirements are placed on incoming HTTP requests:"
            - list [ref=e356]:
              - listitem [ref=e357]:
                - text: The request
                - strong [ref=e358]: MUST
                - text: have a
                - code [ref=e359]: User-Agent
                - text: header, and it must not be spoofed
              - listitem [ref=e360]:
                - text: The request
                - strong [ref=e361]: CANNOT
                - text: have a
                - code [ref=e362]: Via
                - text: "header (i.e.: we do not allow non-transparent proxies)"
            - paragraph [ref=e363]: "The following anti-abuse policies are in place:"
            - list [ref=e364]:
              - listitem [ref=e365]:
                - paragraph [ref=e366]:
                  - text: We do not send
                  - link "CORS" [ref=e367] [cursor=pointer]:
                    - /url: https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS
                  - text: responses for other websites than ours;
                  - strong [ref=e368]: MUST
                  - text: proxy the requests your users make to our services, and inject your own CORS responses and headers where relevant
              - listitem [ref=e369]:
                - paragraph [ref=e370]:
                  - text: We will serve the
                  - link "wrong response" [ref=e371] [cursor=pointer]:
                    - /url: https://uploads.mangadex.org/agg.jpg
                  - text: for any image hotlinked from our domains; you
                  - strong [ref=e372]: MUST
                  - text: proxy the requests your users make to our services
            - paragraph [ref=e373]: Finally, an undocumented handful of IPv4 subnets are banned forever from reaching us.
            - heading "# General rate limit" [level=2] [ref=e375]:
              - link "#" [ref=e376] [cursor=pointer]:
                - /url: "#general-rate-limit"
              - text: General rate limit
            - paragraph [ref=e377]:
              - text: A
              - strong [ref=e378]: global limit of approximately 5 requests per second per IP address
              - text: is in effect for
              - code [ref=e379]: api.mangadex.org
              - text: as a whole (and its development counterpart,
              - code [ref=e380]: api.mangadex.dev
              - text: ", independently)."
            - generic [ref=e381]:
              - generic [ref=e382] [cursor=pointer]:
                - generic [ref=e384]: Exact rate limit
                - link [ref=e388]:
                  - /url: "#exact-rate-limit"
              - paragraph [ref=e390]: This is not an exact value but a minimum guaranteed allowance. Your effective allowed rate may be higher for various reasons (notably that we enforce it at the load balancer level, so if you reach 2 load balancers of ours perfectly equitably, you would get 10 requests/s. This is not something you can reliably control.)
            - generic [ref=e391]:
              - generic [ref=e392] [cursor=pointer]:
                - generic [ref=e394]: Exceeded rate limit
                - link [ref=e398]:
                  - /url: "#exceeded-rate-limit"
              - generic [ref=e399]:
                - paragraph [ref=e400]:
                  - text: Once above this rate limit, you will receive HTTP 429 responses for all requests to
                  - code [ref=e401]: "*.mangadex.org"
                  - text: until enough time has passed to bring your rate back in line.
                - paragraph [ref=e402]:
                  - text: If you persist in sending requests while receiving HTTP 429 responses, our DDoS protection will automatically be triggered and you will be issued a temporary IP address ban, resulting in a generic HTTP 403 response for all requests to
                  - code [ref=e403]: "*.mangadex.org"
                  - text: . Its duration is not documented and subject to change without notice.
                - paragraph [ref=e404]: If you still persist in sending requests at that point, we will automatically stop replying to your IP address altogether until we stop receiving traffic from you for a while. This cooldown period is renewed for every request you send while still blocked. Its duration is not documented and subject to change without notice.
            - generic [ref=e405]:
              - generic [ref=e406] [cursor=pointer]:
                - generic [ref=e408]: Abusive patterns rate limit
                - link [ref=e412]:
                  - /url: "#abusive-patterns-rate-limit"
              - generic [ref=e413]:
                - paragraph [ref=e414]: Unfortunately, we regularly see particularly abusive request patterns from clients that are just too lazy/disrespectful to use our API decently. If you wonder whether your usage falls in this category, it probably doesn't. And offenders are nearly always well-aware of it.
                - paragraph [ref=e415]:
                  - text: "TL;DR: If you decide to do 500 requests where the same exact feature is implementable with 1 single request, we will"
                  - strong [ref=e416]: drastically
                  - text: throttle you, or block it altogether. The reduced rate and the patterns affected are not documented and subject to change without notice.
            - generic [ref=e417]:
              - generic [ref=e418] [cursor=pointer]:
                - generic [ref=e420]: Non-API rate limits
                - link [ref=e424]:
                  - /url: "#non-api-rate-limits"
              - paragraph [ref=e426]:
                - text: We enforce rate limits on all of our public services; this page documents only the ones for
                - code [ref=e427]: api.mangadex.org
                - text: specifically. These other rate limits are for DDoS protection and you will not hit them if you aren't trying to DoS us. They are not documented and subject to change without notice.
            - heading "# Endpoint-specific rate limits" [level=2] [ref=e429]:
              - link "#" [ref=e430] [cursor=pointer]:
                - /url: "#endpoint-specific-rate-limits"
              - text: Endpoint-specific rate limits
            - paragraph [ref=e431]:
              - text: On top of this general limit,
              - strong [ref=e432]: some endpoints are further restricted
              - text: as follows, primarily to combat spam and/or mistaken API usage.
            - paragraph [ref=e433]: Most use-cases are highly unlikely to hit them in normal usage, since they mainly relate to data modification rather than consumption.
