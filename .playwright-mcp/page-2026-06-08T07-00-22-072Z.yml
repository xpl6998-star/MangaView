            - heading "# Language Codes & Localization" [level=2] [ref=e321]:
              - link "#" [ref=e322] [cursor=pointer]:
                - /url: "#language-codes--localization"
              - text: Language Codes & Localization
            - paragraph [ref=e323]:
              - text: To denote Chapter Translation language, translated fields such as Titles and Descriptions, the API expects a 2-letter language code in accordance with the
              - link "ISO 639-1 standard" [ref=e324] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes
              - text: . Additionally, some cases require the
              - link "5-letter extension" [ref=e325] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/IETF_language_tag
              - text: if the alpha-2 code is not sufficient to determine the correct sub-type of a language, in the style of $language-$region, e.g.
              - code [ref=e326]: zh-hk
              - text: or
              - code [ref=e327]: pt-br
              - text: .
            - paragraph [ref=e328]:
              - text: Because there is no standardized method of denoting romanized translations, we chose to append the
              - code [ref=e329]: "-ro"
              - text: suffix. For example the romanized version of
              - code [ref=e330]: 五等分の花嫁
              - text: is
              - code [ref=e331]: 5Toubun no Hanayome
              - text: or
              - code [ref=e332]: Gotoubun no Hanayome
              - text: . Both would have the
              - code [ref=e333]: ja-ro
              - text: language code, alternative versions are inserted as alternative titles. This is a clear distinction from the localized
              - code [ref=e334]: en
              - text: translation
              - code [ref=e335]: The Quintessential Quintuplets
            - paragraph [ref=e336]: Notable exceptions are in the table below, otherwise ask a staff member if unsure.
