            - button [ref=e314] [cursor=pointer]
            - heading "# MangaDex API documentation" [level=1] [ref=e318]:
              - link "#" [ref=e319] [cursor=pointer]:
                - /url: "#mangadex-api-documentation"
              - text: MangaDex API documentation
            - paragraph [ref=e320]: MangaDex is an ad-free manga reader offering high-quality images.
            - paragraph [ref=e321]:
              - text: This sub-site documents the usage of our API for projects of your own. As our API changes over time, so does this document. We always give advance notice of significant changes in the
              - strong [ref=e322]: api-changelog
              - text: channel of our
              - link "Discord server" [ref=e323] [cursor=pointer]:
                - /url: https://discord.gg/mangadex
              - text: .
            - heading "# Acceptable Usage Policy" [level=2] [ref=e325]:
              - link "#" [ref=e326] [cursor=pointer]:
                - /url: "#acceptable-usage-policy"
              - text: Acceptable Usage Policy
            - paragraph [ref=e327]:
              - text: We make our API
              - strong [ref=e328]: entirely public
              - text: and
              - strong [ref=e329]: free to use
              - text: "exclusively for projects that satisfy the following:"
            - list [ref=e330]:
              - listitem [ref=e331]:
                - text: You
                - strong [ref=e332]: MUST
                - text: credit MangaDex
              - listitem [ref=e333]:
                - text: You
                - strong [ref=e334]: MUST
                - text: credit scanlation groups (and honor their content removal requests) if you allow reading chapters
              - listitem [ref=e335]:
                - text: You
                - strong [ref=e336]: CANNOT
                - text: run ads or paid services on your website and/or apps
            - generic [ref=e337]:
              - generic [ref=e338] [cursor=pointer]:
                - generic [ref=e340]: Scanlation group removal requests
                - link [ref=e344]:
                  - /url: "#scanlation-group-removal-requests"
              - generic [ref=e345]:
                - paragraph [ref=e346]: A scanlation group removal request is any request in writing that originates from an active (as per the group's MangaDex page) scanlation group's leader asking you to make their works unavailable on your platform.
                - paragraph [ref=e347]: As we do honor such requests, you must in turn honor them. This applies to both groups that upload on MangaDex and groups that do not.
            - generic [ref=e348]:
              - generic [ref=e349] [cursor=pointer]:
                - generic [ref=e351]: What constitutes an "ad" or a "paid service"?
                - link [ref=e355]:
                  - /url: "#what-constitutes-an-ad-or-a-paid-service"
              - generic [ref=e356]:
                - paragraph [ref=e357]: The point is that you must not be profiting from our API. Exceptions may be made for legitimate services, but never for non-legal services.
                - paragraph [ref=e358]: So the rule of thumb is that you may not have any advertisement (placed content from which you derive a revenue) at all on your platform, nor sell access to anything provided by the MangaDex API. You may accept donations however.
                - paragraph [ref=e359]: In the end, we're not lawyers, and will judge on a case-by-case basis. We will cut off offenders even if "technically" those rules don't cover them because of some semantic loophole.
            - heading "# Issues and Questions" [level=2] [ref=e361]:
              - link "#" [ref=e362] [cursor=pointer]:
                - /url: "#issues-and-questions"
              - text: Issues and Questions
            - heading "# I have a question" [level=3] [ref=e364]:
              - link "#" [ref=e365] [cursor=pointer]:
                - /url: "#i-have-a-question"
              - text: I have a question
            - paragraph [ref=e366]:
              - text: You may join
              - link "our Discord" [ref=e367] [cursor=pointer]:
                - /url: https://discord.gg/mangadex
              - text: "'s"
              - code [ref=e368]: "#dev-talk-api"
              - text: channel to ask questions or for help.
            - paragraph [ref=e369]: However we're all busy so please read the docs first, then a second time, or try searching in the channel. Then ask away if you can't figure it out.
            - heading "# Security Issues" [level=3] [ref=e371]:
              - link "#" [ref=e372] [cursor=pointer]:
                - /url: "#security-issues"
              - text: Security Issues
            - paragraph [ref=e373]: "If you think you found a security issue, please contact us privately as soon as possible via either:"
            - list [ref=e374]:
              - listitem [ref=e375]:
                - strong [ref=e376]: (Preferred)
                - text: Our security@ email (see
                - link "security.txt file" [ref=e377] [cursor=pointer]:
                  - /url: https://api.mangadex.org/security.txt
                - text: )
              - listitem [ref=e378]:
                - text: A staff member on our
                - link "Discord server" [ref=e379] [cursor=pointer]:
                  - /url: https://discord.gg/mangadex
            - paragraph [ref=e380]: If you aren't certain, it is better to ask us privately first anyway. We prefer a false-positive than something coming our endangering our users' privacy.
            - paragraph [ref=e381]: And please keep it in private until you get a response; there are a lots of eyes watching our public discussion channels, ready to abuse anything they can as soon as they learn of it.
            - heading "# I found a bug" [level=3] [ref=e383]:
              - link "#" [ref=e384] [cursor=pointer]:
                - /url: "#i-found-a-bug"
              - text: I found a bug
            - paragraph [ref=e385]:
              - text: Please read the docs carefully and
              - strong [ref=e386]: triple-check
              - text: the request you're actually sending to us. If you're sure you found a bug, then congrats and please report it to us so we can fix it!
            - generic [ref=e387]:
              - generic [ref=e388] [cursor=pointer]:
                - generic [ref=e390]: Request identifiers for debugging
                - link [ref=e394]:
                  - /url: "#request-identifiers-for-debugging"
              - generic [ref=e395]:
                - paragraph [ref=e396]:
                  - text: Every HTTP response from our services has a
                  - code [ref=e397]: X-Request-ID
                  - text: header with a value unique to the request-response that was handled. Please provide it to us when reporting the bug. If your request has a body, please also provide it.
                - paragraph [ref=e398]: "Essentially, we suggest that your error error handling should look something like this:"
                - generic [ref=e400]:
                  - button [ref=e404] [cursor=pointer]
                  - region "scrollable content" [ref=e413]:
                    - code [ref=e415]: "var httpResponse = httpClient.execute(httpRequest); if (httpResponse.status >= 400) { logger.error(\" Request ID: ${httpResponse.headers['X-Request-ID]'} Request: ${httpRequest.body} Response: ${httpResponse.body} \"); }"
                - alert [ref=e418]:
                  - generic [ref=e425]:
                    - paragraph [ref=e426]:
                      - text: The HTTP specification notes that
                      - link "headers (fields) are case-insensitive" [ref=e427] [cursor=pointer]:
                        - /url: https://www.rfc-editor.org/rfc/rfc9110.html#fields
                      - text: so check that your HTTP library is properly handling that when retrieving the header's value.
                    - paragraph [ref=e428]:
                      - text: Ours are
                      - emphasis [ref=e429]: typically
                      - text: always lowercase in practice but do not rely on that.
            - heading "# I found something missing/wrong in the documentation" [level=3] [ref=e431]:
              - link "#" [ref=e432] [cursor=pointer]:
                - /url: "#i-found-something-missingwrong-in-the-documentation"
              - text: I found something missing/wrong in the documentation
            - paragraph [ref=e433]:
              - text: We sometimes forget or make mistakes when updating the documentation. Please report it to us on our
              - link "Discord server" [ref=e434] [cursor=pointer]:
                - /url: https://discord.gg/mangadex
              - text: ", or make a merge request for it against our api-docs repository."
            - paragraph [ref=e435]: Occasionally, some things (like response fields) may be undocumented on purpose, for example when they are only experimental and cannot be relied upon yet. If you ask us, we will clarify it.
