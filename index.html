<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MangaView - Discover and read your favorite anime and manga with a beautiful anime-style interface powered by Jikan API (MyAnimeList)">
  <meta name="keywords" content="manga, anime, read manga, MyAnimeList, Jikan, manga reader">
  <title>MangaView - Anime & Manga Reader</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23FFB7C5'/%3E%3Ccircle cx='50' cy='50' r='30' fill='%239B7BB8'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%237EC8E3'/%3E%3C/svg%3E">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header" class="header"></header>

  <!-- Main Application Container -->
  <main id="app">
    <!-- Loading State -->
    <div class="page">
      <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
        <div style="text-align: center;">
          <div style="font-size: 3rem; margin-bottom: 16px;">🌸</div>
          <p style="color: var(--text-secondary);">Loading MangaView...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__logo">🌸 MangaView</p>
      <p class="footer__credit">
        Powered by <a href="https://jikan.moe" target="_blank" rel="noopener" class="footer__link">Jikan API</a> (MyAnimeList).
        Anime & manga database.
      </p>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">
        MyAnimeList™ is a trademark of their respective owners. This is a fan project for educational purposes.
      </p>
    </div>
  </footer>

  <!-- JavaScript Module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
